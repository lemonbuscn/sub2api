# =============================================================================
# Nginx 配置片段 — LemonFly 文档站点
# =============================================================================
# 使用方式：在你的 nginx server {} 块中 include 这个文件，或者直接粘贴进去。
#
# 文档文件放在服务器上的 /opt/lemonfly-docs/ 目录：
#   /opt/lemonfly-docs/index.html
#
# 更新文档只需要替换这个文件，然后 nginx -s reload 即可。
# =============================================================================

# 文档页面
location = /docs {
    return 301 /docs/;
}

location /docs/ {
    alias /opt/lemonfly-docs/;
    index index.html;
    try_files $uri $uri/ /docs/index.html;

    # 缓存静态资源
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        alias /opt/lemonfly-docs/;
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
